name: Build

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm install
      
      - run: npm run build
      
      - run: npm run electron:build -- --win --publish=never
      
      - uses: actions/upload-artifact@v4
        with:
          name: windows
          path: release/*

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm install
      
      - run: npm run build
      
      - run: npm run electron:build -- --mac --publish=never
      
      - uses: actions/upload-artifact@v4
        with:
          name: macos
          path: release/*

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      
      - run: npm install
      
      - run: npm run build
      
      - run: npm run electron:build -- --linux --publish=never
      
      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: release/*
